services:
  postgres:
    image: postgres:15-alpine
    container_name: horarios-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: horarios_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - horarios_pgdata_pg15:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d horarios_db"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: horarios-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/horarios_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: cambiar-en-produccion-clave-segura-de-32-caracteres-minimo
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
    container_name: horarios-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  horarios_pgdata_pg15:
