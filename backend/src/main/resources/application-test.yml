spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false

app:
  jwt:
    secret: test-secret-key-de-al-menos-32-caracteres-para-pruebas
    expiration: 3600000
  scheduler:
    max-iteraciones: 1000
    timeout-segundos: 30
